    <div>
      <h1 className="page-title serif">Withdrawal Management</h1>
      <p className="page-sub">Requests move from Pending → Approved/Rejected → Paid once the payout API is connected.</p>
      {loadError && (
        <div className="card" style={{ background: "#FEF2F2", border: "1px solid #FCA5A5", color: "#7F1D1D", marginBottom: 14 }}>
          <b>Couldn't load withdrawals from Supabase:</b> {loadError}
          <br />Screenshot this and send it — this is the exact reason the list is empty.
        </div>
      )}
      <div className="chip-row" style={{marginBottom:16}}>
        {["pending","approved","rejected","paid"].map(t => <button key={t} className={"chip"+(tab===t?" on":"")} onClick={()=>setTab(t)}>{t[0].toUpperCase()+t.slice(1)}</button>)}
      </div>
      <div className="tbl-wrap">
        <table className="tbl">
          <thead><tr><th>User</th><th>Amount</th><th>Method</th><th>Requested</th><th></th></tr></thead>
          <tbody>
            {list.map(w => (
              <tr key={w.id}>
                <td data-label="User">{maskPhone(w.userPhone)}</td>
                <td data-label="Amount">{fmtINR(w.amount)}</td>
                <td data-label="Method">{w.method}</td>
                <td data-label="Requested">{w.requestedAt}{w.status === "rejected" && w.rejectionReason && <><br /><span style={{ color: "#B91C1C", fontSize: 12 }}>Reason: {w.rejectionReason}</span></>}</td>
                <td data-label="Actions" style={{display:"flex", gap:6, justifyContent:"flex-end"}}>
                  {w.status==="pending" && <React.Fragment>
                    <button className="btn sm" onClick={()=>setStatus(w.id,"approved")}>Approve</button>
                    <button className="btn sm danger" onClick={()=>{
                      const reason = window.prompt("Reject reason (user ko dikhega):");
                      if (reason === null) return;
                      setStatus(w.id, "rejected", reason.trim());
                    }}>Reject</button>
                  </React.Fragment>}
                  {w.status==="approved" && <button className="btn sm" onClick={()=>setStatus(w.id,"paid")}>Mark Paid</button>}
                </td>
              </tr>
            ))}
            {list.length===0 && <tr><td colSpan="5"><div className="empty-state">No {tab} withdrawals.</div></td></tr>}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ============================== Content Management ============================== */
// TODO: POST /admin/content { privacy, terms, faqs } — should update the live site instantly, no redeploy.
function ContentPage({ state, setState, toast }) {
  const [f, setF] = useState(state.content);
  const setFaq = (i,k,v) => setF(prev => { const faqs=[...prev.faqs]; faqs[i]={...faqs[i],[k]:v}; return {...prev, faqs}; });
  const addFaq = () => setF(prev => ({ ...prev, faqs: [...prev.faqs, { q:"", a:"" }] }));
  const removeFaq = (i) => setF(prev => ({ ...prev, faqs: prev.faqs.filter((_,idx)=>idx!==i) }));
  const publish = () => { setState(prev => ({ ...prev, content: f })); toast("Content published to the live site."); };
  return (
    <div>
      <h1 className="page-title serif">Content Management</h1>
      <p className="page-sub">Edit Privacy Policy, Terms and FAQs — publish instantly once the backend is wired, no redeploy needed.</p>
      <div className="card">
        <div className="field"><label className="field-label">Privacy Policy</label><textarea className="textarea" style={{minHeight:110}} value={f.privacy} onChange={e=>setF({...f, privacy:e.target.value})} /></div>
        <div className="field"><label className="field-label">Terms & Conditions</label><textarea className="textarea" style={{minHeight:110}} value={f.terms} onChange={e=>setF({...f, terms:e.target.value})} /></div>
      </div>
      <div className="section-head"><h2>FAQs</h2><button className="btn outline sm" onClick={addFaq}><Icon.Plus/> Add FAQ</button></div>
      {f.faqs.map((item,i) => (
        <div className="card" key={i}>
          <div className="field"><label className="field-label">Question</label><input className="input" value={item.q} onChange={e=>setFaq(i,"q",e.target.value)} /></div>
          <div className="field"><label className="field-label">Answer</label><textarea className="textarea" value={item.a} onChange={e=>setFaq(i,"a",e.target.value)} /></div>
          <button className="btn danger sm" onClick={()=>removeFaq(i)}><Icon.Trash/> Remove</button>
        </div>
      ))}
      <button className="btn" style={{marginTop:16}} onClick={publish}><Icon.Check/> Publish changes</button>
    </div>
  );
}

/* ============================== Data Export ============================== */
function toCsv(rows, headers) {
  const esc = (v) => `"${String(v ?? "").replace(/"/g,'""')}"`;
  return [headers.join(","), ...rows.map(r => headers.map(h => esc(r[h])).join(","))].join("\n");
}
function downloadBlob(content, filename, type) {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href = url; a.download = filename; document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}
function ExportPage({ state, toast }) {
  const exportCsv = (kind) => {
    let csv, filename;
    if (kind === "users") { csv = toCsv(state.users, ["id","name","phone","joined","wallet","offersCompleted"]); filename = "earnora-users.csv"; }
    else if (kind === "conversions") { csv = toCsv(state.conversions, ["id","userPhone","offerId","date","mode","amount","status"]); filename = "earnora-conversions.csv"; }
    else { csv = toCsv(state.withdrawals, ["id","userPhone","amount","method","status","requestedAt"]); filename = "earnora-withdrawals.csv"; }
    downloadBlob(csv, filename, "text/csv");
    toast("CSV downloaded — opens directly in Excel.");
  };
  const exportPdf = (kind) => {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    let rows, headers, title;
    if (kind === "users") { rows = state.users; headers = ["name","phone","joined","wallet","offersCompleted"]; title = "Earnora — Users"; }
    else if (kind === "conversions") { rows = state.conversions; headers = ["userPhone","offerId","date","mode","amount","status"]; title = "Earnora — Conversion Log"; }
    else { rows = state.withdrawals; headers = ["userPhone","amount","method","status","requestedAt"]; title = "Earnora — Withdrawals"; }
    doc.setFontSize(14); doc.text(title, 14, 16);
    doc.setFontSize(9);
    let y = 26;
    doc.text(headers.join("  |  "), 14, y);
    y += 6;
    rows.forEach(r => { const line = headers.map(h => String(r[h] ?? "")).join("  |  "); doc.text(line.slice(0,110), 14, y); y += 6; if (y > 280) { doc.addPage(); y = 16; } });
    doc.save(`earnora-${kind}.pdf`);
    toast("PDF downloaded.");
  };
  const Row = ({ label, kind }) => (
    <div className="card" style={{display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:10}}>
      <div>{label}</div>
      <div style={{display:"flex", gap:8}}>
        <button className="btn outline sm" onClick={()=>exportCsv(kind)}><Icon.Download/> Excel (CSV)</button>
        <button className="btn outline sm" onClick={()=>exportPdf(kind)}><Icon.Download/> PDF</button>
      </div>
    </div>
  );
  return (
    <div>
      <h1 className="page-title serif">Data Export</h1>
      <p className="page-sub">Export platform data as Excel-compatible CSV or PDF.</p>
      <Row label="User data" kind="users" />
      <Row label="Conversion / tracking logs" kind="conversions" />
      <Row label="Withdrawal requests" kind="withdrawals" />
    </div>
  );
}

/* ============================== Sub-admin Roles ============================== */
// TODO: POST /admin/subadmins — each sub-admin should get their own OTP-based login,
// scoped server-side to exactly the permissions set here (never trust client-side only).
function SubadminsPage({ state, setState, toast }) {
  const [modal, setModal] = useState(null);
  const save = async (f) => {
    if (!f.name.trim() || f.phone.length !== 10) { toast("Name and a valid 10-digit phone are required."); return; }
    const saved = await upsertSubadminToSupabase(f);
    if (!saved) { toast("Couldn't save sub-admin — check connection and try again."); return; }
    setState(prev => {
      const exists = prev.subadmins.some(s => s.id === saved.id);
      const subadmins = exists ? prev.subadmins.map(s => s.id === saved.id ? saved : s) : [...prev.subadmins, saved];
      return { ...prev, subadmins };
    });
    toast("Sub-admin saved."); setModal(null);
  };
  const remove = async (id) => {
    if (!confirm("Remove this sub-admin?")) return;
    setState(prev => ({ ...prev, subadmins: prev.subadmins.filter(s => s.id !== id) }));
    const ok = await deleteSubadminFromSupabase(id);
    if (!ok) toast("Removed locally, but the server delete failed — check connection.");
  };
  return (
    <div>
      <div className="page-title-row"><h1 className="page-title serif">Sub-admin Roles</h1><button className="btn" onClick={()=>setModal({ id:"", name:"", phone:"", perms: Object.fromEntries(MODULES.map(m=>[m.key,false])) })}><Icon.Plus/> Add sub-admin</button></div>
      <p className="page-sub">Grant each sub-admin exactly the sections they need. Nothing else is visible or editable by them.</p>
      {state.subadmins.map(s => (
        <div className="card" key={s.id}>
          <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:10}}>
            <div><b>{s.name}</b> · {maskPhone(s.phone)}</div>
            <div style={{display:"flex", gap:8}}>
              <button className="btn outline sm" onClick={()=>setModal(s)}><Icon.Pencil/> Edit</button>
              <button className="btn danger sm" onClick={()=>remove(s.id)}><Icon.Trash/></button>
            </div>
          </div>
          <div className="chip-row" style={{marginTop:10}}>
            {MODULES.filter(m=>s.perms[m.key]).map(m => <span key={m.key} className="badge green">{m.label}</span>)}
            {MODULES.every(m=>!s.perms[m.key]) && <span className="badge">No access granted</span>}
          </div>
        </div>
      ))}
      {state.subadmins.length===0 && <div className="empty-state">No sub-admins yet.</div>}
      <Modal open={!!modal} onClose={()=>setModal(null)} title={modal?.id ? "Edit sub-admin" : "Add sub-admin"}>
        {modal && <SubadminForm initial={modal} onSave={save} onCancel={()=>setModal(null)} />}
      </Modal>
    </div>
  );
}
function SubadminForm({ initial, onSave, onCancel }) {
  const [f, setF] = useState(initial);
  const togglePerm = (k) => setF(prev => ({ ...prev, perms: { ...prev.perms, [k]: !prev.perms[k] } }));
  const allOn = MODULES.every(m => f.perms[m.key]);
  const toggleAllPerms = () => setF(prev => ({ ...prev, perms: Object.fromEntries(MODULES.map(m => [m.key, !allOn])) }));
  return (
    <div>
      <div className="field-row">
        <div className="field"><label className="field-label">Name</label><input className="input" value={f.name} onChange={e=>setF({...f,name:e.target.value})} /></div>
        <div className="field"><label className="field-label">Phone</label><input className="input" value={f.phone} onChange={e=>setF({...f,phone:e.target.value.replace(/\D/g,"").slice(0,10)})} /></div>
      </div>
      <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:6}}>
        <label className="field-label" style={{margin:0}}>Permissions</label>
        <button type="button" className="btn outline sm" onClick={toggleAllPerms}>{allOn ? "Clear all" : "All permissions"}</button>
      </div>
      <div className="card" style={{padding:"4px 16px"}}>
        {MODULES.map(m => (
          <div className="perm-row" key={m.key}>{m.label}<button className={"toggle"+(f.perms[m.key]?" on":"")} onClick={()=>togglePerm(m.key)}></button></div>
        ))}
      </div>
      <p className="field-hint">Sub-admins never see or manage Sub-admin Roles — that stays Super Admin only, regardless of permissions granted here.</p>
      <div className="modal-foot"><button className="btn outline" onClick={onCancel}>Cancel</button><button className="btn" onClick={()=>onSave(f)}>Save</button></div>
    </div>
  );
}

/* ============================== App shell / routing ============================== */
const ROUTES = [
  { key: "dashboard", label: "Dashboard", icon: Icon.Grid },
  { key: "offers", label: "Offer Management", icon: Icon.Gift },
  { key: "crm", label: "CRM Bulk Credit", icon: Icon.Upload },
  { key: "wallet", label: "Wallet Adjustment", icon: Icon.Wallet },
  { key: "users", label: "User Management", icon: Icon.User },
  { key: "conversions", label: "Conversion Log", icon: Icon.List },
  { key: "withdrawals", label: "Withdrawals", icon: Icon.CreditOut },
  { key: "content", label: "Content", icon: Icon.Doc },
  { key: "export", label: "Data Export", icon: Icon.Download },
  { key: "subadmins", label: "Sub-admin Roles", icon: Icon.Shield },
];

function parseHash() { return (location.hash.replace("#/","") || "dashboard"); }

const ADMIN_SESSION_KEY = "earnora_admin_session_v1";
function loadAdminSession() {
  try { const raw = localStorage.getItem(ADMIN_SESSION_KEY); if (raw) return JSON.parse(raw); } catch (e) {}
  return null;
}

function AdminApp() {
  const [admin, setAdminRaw] = useState(loadAdminSession());
  const [route, setRoute] = useState(parseHash());
  const [sidebarOn, setSidebarOn] = useState(false);
  const [state, setStateRaw] = useState(loadState());
  const [withdrawalsError, setWithdrawalsError] = useState(null);
  const [toast, toastNode] = useToast();

  // TODO: once the backend is connected, replace this localStorage session with a real
  // admin token check on load — this only keeps the demo admin logged in across refreshes.
  const setAdmin = (a) => {
    setAdminRaw(a);
    try { if (a) localStorage.setItem(ADMIN_SESSION_KEY, JSON.stringify(a)); else localStorage.removeItem(ADMIN_SESSION_KEY); } catch (e) {}
  };

  useEffect(() => { const h = () => setRoute(parseHash()); window.addEventListener("hashchange", h); return () => window.removeEventListener("hashchange", h); }, []);
  useEffect(() => { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {} }, [state]);

  // Offers now live in Supabase (managed here in the Admin Panel, read by the
  // consumer app). Fetch the real list once on load, replacing the local seed.
  useEffect(() => {
    fetchOffersFromSupabase().then(offers => {
      if (offers) setStateRaw(prev => ({ ...prev, offers }));
    });
  }, []);

  // Real users (created the moment someone logs into the consumer app) —
  // replaces the local demo user list.
  useEffect(() => {
    fetchUsersFromSupabase().then(users => {
      if (users) setStateRaw(prev => ({ ...prev, users }));
    });
  }, []);

  // FIX: withdrawal requests made from the user app now show up here — this used
  // to just show the local seed list and never talked to Supabase at all.
  useEffect(() => {
    fetchWithdrawalsFromSupabase().then(({ withdrawals, errorMessage }) => {
      if (withdrawals) setStateRaw(prev => ({ ...prev, withdrawals }));
      setWithdrawalsError(errorMessage);
    });
  }, []);

  // FIX: sub-admins now come from Supabase so they persist across devices/browsers,
  // instead of only ever living in this one browser's localStorage.
  useEffect(() => {
    fetchSubadminsFromSupabase().then(subadmins => {
      if (subadmins) setStateRaw(prev => ({ ...prev, subadmins }));
    });
  }, []);
  const setState = (fn) => setStateRaw(fn);

  const go = (key) => { location.hash = "#/" + key; setSidebarOn(false); };

  if (!admin) return <React.Fragment><AdminLogin onLogin={setAdmin} subadmins={state.subadmins} />{toastNode}</React.Fragment>;

  // Dashboard is always visible; Sub-admin Roles is Super Admin only; every other
  // route requires the matching permission flag on the logged-in admin/sub-admin.
  const visibleRoutes = ROUTES.filter(r => r.key === "dashboard" || (r.key === "subadmins" ? admin.role === "Super Admin" : admin.perms[r.key]));
  const current = visibleRoutes.find(r => r.key === route) || visibleRoutes[0];
  if (route !== current.key) { location.hash = "#/" + current.key; }
  const pages = {
    dashboard: <Dashboard state={state} go={go} />,
    offers: <OffersPage state={state} setState={setState} toast={toast} />,
    crm: <CrmPage state={state} setState={setState} toast={toast} />,
    wallet: <WalletAdjustPage state={state} setState={setState} toast={toast} />,
    users: <UsersPage state={state} setState={setState} toast={toast} />,
    conversions: <ConversionsPage state={state} />,
    withdrawals: <WithdrawalsPage state={state} setState={setState} toast={toast} loadError={withdrawalsError} />,
    content: <ContentPage state={state} setState={setState} toast={toast} />,
    export: <ExportPage state={state} toast={toast} />,
    subadmins: <SubadminsPage state={state} setState={setState} toast={toast} />,
  };

  return (
    <div className="admin-shell">
      <div className={"sidebar-backdrop" + (sidebarOn ? " on" : "")} onClick={() => setSidebarOn(false)}></div>
      <aside className={"sidebar" + (sidebarOn ? " on" : "")}>
        <div className="sidebar-head">
          <div className="sidebar-brand serif"><span className="mark-earn">Earn</span><span className="mark-ora">ora</span> <span style={{fontSize:12, color:"var(--ink-soft)", fontFamily:"Satoshi, sans-serif", fontWeight:500}}>Admin</span></div>
          <button className="icon-btn hamburger sidebar-x" onClick={() => setSidebarOn(false)}><Icon.Close/></button>
        </div>
        <nav className="sidebar-nav">
          <div className="side-group-label">Operations</div>
          {visibleRoutes.map(r => (
            <button key={r.key} className={"side-link" + (route===r.key ? " on" : "")} onClick={() => go(r.key)}>
              <r.icon/> {r.label}
            </button>
          ))}
        </nav>
        <div className="sidebar-foot">
          <div className="admin-id">
            <div className="admin-avatar">{admin.name[0]}</div>
            <div><span className="admin-name">{admin.name}</span><span className="admin-role">{admin.role} · {maskPhone(admin.phone)}</span></div>
          </div>
          <button className="btn outline" style={{width:"100%"}} onClick={() => setAdmin(null)}><Icon.LogOut/> Log out</button>
        </div>
      </aside>
      <div className="main-col">
        <div className="topbar">
          <button className="icon-btn hamburger" onClick={() => setSidebarOn(true)}><Icon.Menu/></button>
          <div className="topbar-title">{current.label}</div>
        </div>
        <div className="content">{pages[route]}</div>
      </div>
      {toastNode}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AdminApp />);
</script>
</body>
</html>
