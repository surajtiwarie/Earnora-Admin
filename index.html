<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Earnora — Play. Refer. Earn.</title>
<link rel="preconnect" href="https://api.fontshare.com" />
<link rel="preconnect" href="https://cdn.fontshare.com" crossorigin />
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&f[]=satoshi@400,500,700,900&display=swap" rel="stylesheet" />
<style>
:root {
  --bg: #F7FAF7; --panel: #ECF3EC; --card: #FFFFFF; --ink: #10231B; --ink-soft: #5F6E65;
  --line: #E3EAE3; --brand: #0AA06A; --brand-deep: #067050; --forest: #0B3B2C;
  --orange: #EA700B; --green: #0AA06A; --sky: #0284C7; --pink: #EC4899; --red: #DE3B3B;
  --gold: #C77800; /* used ONLY for the wallet ₹ symbol */
  --grad-brand: linear-gradient(135deg, #047857 0%, #0AA06A 55%, #10B981 100%);
  --grad-hero: radial-gradient(120% 100% at 88% -12%, rgba(163,230,53,.28), transparent 55%),
               radial-gradient(90% 80% at -8% 112%, rgba(34,211,238,.24), transparent 52%),
               linear-gradient(148deg, #06251B 0%, #0B5B3E 52%, #10A56B 100%);
  --shadow-card: 0 10px 30px -18px rgba(16,58,42,.25);
  --shadow-brand: 0 14px 30px -12px rgba(10,160,106,.55);
  --nav-h: 64px; --bottom-nav-h: 76px;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body, #root { min-height: 100%; }
button, a, input, select, textarea, [role="button"] { -webkit-tap-highlight-color: transparent; }
body {
  margin: 0; color: var(--ink); font-family: "Satoshi", sans-serif; -webkit-font-smoothing: antialiased;
  background: radial-gradient(70% 26% at 50% 0%, rgba(16,185,129,.07), transparent 70%), var(--bg);
}
a { color: inherit; text-decoration: none; }
::selection { background: rgba(16,185,129,.22); }
.serif { font-family: "Clash Display", "Satoshi", sans-serif; letter-spacing: -.01em; }
.mono { font-family: "Satoshi", sans-serif; font-weight: 700; font-variant-numeric: tabular-nums; }
button, input, select, textarea { font-family: inherit; color: inherit; }
:focus-visible { outline: 2px solid var(--brand); outline-offset: 2px; border-radius: 6px; }

.page { max-width: 640px; margin: 0 auto; padding: 24px 20px calc(var(--bottom-nav-h) + 24px); }
@media (min-width: 900px) { .page { max-width: 760px; padding: 32px 32px 48px; } }
.h1 { font-size: 29px; font-weight: 600; margin: 0; }
.h2 { font-size: 22px; font-weight: 600; margin: 0; }
.sub { color: var(--ink-soft); font-size: 13.5px; margin: 6px 0 18px; line-height: 1.55; }

.icon-btn {
  width: 38px; height: 38px; border-radius: 50%; border: 1px solid var(--line); background: var(--card); color: var(--ink);
  display: grid; place-items: center; cursor: pointer; flex-shrink: 0; box-shadow: 0 4px 12px -8px rgba(16,58,42,.25);
  transition: border-color .2s ease, color .2s ease, transform .15s ease;
}
.icon-btn svg { width: 18px; height: 18px; transition: transform .18s ease; }
.icon-btn:hover { border-color: var(--brand); color: var(--brand); transform: translateY(-1px); }
.icon-btn:active svg { transform: scale(.8) rotate(-10deg); }

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 15px 22px;
  background: var(--grad-brand); color: #fff; border: 0; border-radius: 14px; font: inherit; font-weight: 700;
  font-size: 15px; letter-spacing: .01em; cursor: pointer; position: relative;
  box-shadow: var(--shadow-brand), inset 0 1px 0 rgba(255,255,255,.25);
  transition: filter .2s ease, transform .15s ease, box-shadow .2s ease;
}
.btn:hover { filter: brightness(1.07); transform: translateY(-1px); }
.btn:active { transform: scale(.985); }
.btn:disabled { background: #E5EDE6; color: #9DAFA2; cursor: not-allowed; box-shadow: none; transform: none; filter: none; }
.btn.block { width: 100%; }
.btn.outline { background: none; border: 1.5px solid var(--brand); color: var(--brand); box-shadow: none; }
.btn.outline:hover { background: var(--grad-brand); border-color: transparent; color: #fff; box-shadow: var(--shadow-brand); }
.btn svg { width: 16px; height: 16px; }

.field-label { display: block; font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--ink-soft); margin-bottom: 8px; }
.field-hint { font-size: 11.5px; color: var(--ink-soft); margin: 6px 2px 0; }
.input {
  width: 100%; box-sizing: border-box; border: 1.5px solid var(--line); border-radius: 14px; background: var(--card);
  padding: 14px 16px; font: inherit; font-size: 15px; outline: none; color: var(--ink);
  transition: border-color .2s ease, box-shadow .2s ease;
}
.input:focus { border-color: var(--brand); box-shadow: 0 0 0 4px rgba(16,185,129,.15); }
.textarea { min-height: 110px; resize: vertical; font-family: inherit; }
.char-count { text-align: right; font-size: 11.5px; color: var(--ink-soft); margin-top: 6px; }

.card { background: var(--card); border: 1px solid var(--line); border-radius: 18px; padding: 18px; box-shadow: var(--shadow-card); }
.chip-row { display: flex; gap: 8px; flex-wrap: wrap; }
.chip { display: inline-flex; align-items: center; gap: 6px; font-size: 11.5px; font-weight: 700; padding: 8px 14px; border-radius: 999px; background: var(--card); color: var(--ink-soft); border: 1px solid var(--line); cursor: pointer; transition: all .2s ease; }
.chip.on { background: var(--grad-brand); border-color: transparent; color: #fff; box-shadow: 0 8px 18px -10px rgba(10,160,106,.6); }

@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
.fade-up { animation: fadeUp .4s ease both; }
@keyframes pulseDot { 0%,100% { box-shadow: 0 0 0 0 rgba(10,160,106,.45); } 60% { box-shadow: 0 0 0 5px rgba(10,160,106,0); } }
@keyframes markShine { to { background-position: -200% 0; } }

/* Layout */
.app-shell { min-height: 100vh; }
.app-main { padding-top: var(--nav-h); }
.mobile-topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 30; height: var(--nav-h);
  display: flex; align-items: center; justify-content: space-between; padding: 0 16px;
  background: rgba(249,252,249,.88); backdrop-filter: blur(14px); border-bottom: 1px solid var(--line);
}
.mobile-topbar::after, .desktop-topbar::after {
  content: ""; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, #047857, #0AA06A 55%, #10B981);
}
.mobile-brand { font-size: 21px; font-weight: 600; }
.mobile-brand b, .desktop-brand b { font-weight: 600; background: var(--grad-brand); -webkit-background-clip: text; background-clip: text; color: transparent; }
@media (min-width: 900px) { .mobile-topbar { display: none; } }
.desktop-topbar { display: none; }
@media (min-width: 900px) {
  .desktop-topbar { display: block; position: fixed; top: 0; left: 0; right: 0; z-index: 30; height: var(--nav-h); background: rgba(249,252,249,.88); backdrop-filter: blur(14px); border-bottom: 1px solid var(--line); }
  .desktop-topbar-inner { max-width: 1080px; margin: 0 auto; height: 100%; display: flex; align-items: center; justify-content: space-between; padding: 0 32px; }
  .desktop-brand { background: none; border: 0; cursor: pointer; font-size: 22px; font-weight: 600; padding: 0; }
  .desktop-nav { display: flex; gap: 28px; }
  .desktop-nav-link { font-size: 14.5px; font-weight: 600; color: var(--ink-soft); padding: 8px 0; position: relative; background: none; border: 0; cursor: pointer; transition: color .2s ease; }
  .desktop-nav-link:hover { color: var(--brand); }
  .desktop-nav-link.on { color: var(--brand); font-weight: 700; }
  .desktop-nav-link.on::after { content: ""; position: absolute; left: 0; right: 0; bottom: -13px; height: 2.5px; border-radius: 2px; background: var(--grad-brand); }
  .desktop-actions { display: flex; gap: 10px; }
}
.bottom-nav { position: fixed; left: 0; right: 0; bottom: 0; z-index: 20; background: rgba(249,252,249,.9); backdrop-filter: blur(16px); border-top: 1px solid var(--line); padding-bottom: env(safe-area-inset-bottom); box-shadow: 0 -8px 30px -18px rgba(16,58,42,.25); }
.bottom-nav-inner { max-width: 480px; margin: 0 auto; display: grid; grid-template-columns: repeat(3, 1fr); }
.bottom-tab { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 9px 0 8px; font-size: 11px; font-weight: 600; color: var(--ink-soft); background: none; border: 0; cursor: pointer; }
.bottom-tab svg { width: 22px; height: 22px; padding: 4px 18px; border-radius: 999px; box-sizing: content-box; transition: background .25s ease, color .2s ease; }
.bottom-tab.on { color: var(--brand-deep); font-weight: 700; }
.bottom-tab.on svg { background: linear-gradient(135deg, #DFF7EB, #CBF2DF); color: var(--brand-deep); }
@media (min-width: 900px) { .bottom-nav { display: none; } }

.page-header { display: grid; grid-template-columns: 40px 1fr 40px; align-items: center; gap: 10px; margin-bottom: 18px; }
.page-header-title { font-size: 21px; font-weight: 600; text-align: left; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* Drawer */
.drawer-layer { position: fixed; inset: 0; z-index: 50; visibility: hidden; }
.drawer-layer.on { visibility: visible; }
.drawer-backdrop { position: absolute; inset: 0; background: rgba(7,32,23,.5); backdrop-filter: blur(2px); opacity: 0; transition: opacity .25s ease; cursor: pointer; }
.drawer-layer.on .drawer-backdrop { opacity: 1; }
.drawer { position: absolute; top: 0; left: 0; bottom: 0; width: min(340px, 86vw); background: #FBFDFB; box-shadow: 24px 0 60px -24px rgba(7,32,23,.5); display: flex; flex-direction: column; transform: translateX(-100%); transition: transform .28s cubic-bezier(.32,.72,0,1); }
.drawer-layer.on .drawer { transform: translateX(0); }
.drawer-top { display: flex; align-items: center; justify-content: space-between; padding: 20px 18px 16px; border-bottom: 1px solid var(--line); background: linear-gradient(180deg, #EBF9F1, transparent); }
.drawer-id { display: flex; align-items: center; gap: 12px; background: none; border: 0; padding: 0; cursor: pointer; text-align: left; }
.drawer-avatar { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #DFF7EB, #C7F0DC) center/cover no-repeat; color: var(--brand-deep); display: grid; place-items: center; flex-shrink: 0; border: 2px solid #fff; box-shadow: 0 6px 14px -8px rgba(10,160,106,.5); }
.drawer-name { display: block; font-size: 14.5px; font-weight: 700; color: var(--ink); }
.drawer-phone { display: block; font-size: 12px; color: var(--ink-soft); margin-top: 2px; }
.drawer-body { flex: 1; overflow-y: auto; padding: 8px 12px 12px; }
.drawer-section { margin-top: 14px; }
.drawer-heading { font-size: 10.5px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: #93A79A; padding: 0 10px 8px; }
.drawer-item { width: 100%; display: flex; align-items: center; gap: 12px; background: none; border: 0; border-radius: 12px; padding: 11px 10px; font-size: 14px; font-weight: 500; color: var(--ink); text-align: left; cursor: pointer; transition: background .15s ease; }
.drawer-item:hover { background: #EEF7F0; }
.drawer-item-icon { width: 32px; height: 32px; border-radius: 10px; background: linear-gradient(135deg, #E2F8ED, #CDF2DF); color: var(--brand-deep); display: grid; place-items: center; flex-shrink: 0; }
.drawer-item-icon svg { width: 15px; height: 15px; }
.drawer-item-chevron { width: 13px; height: 13px; margin-left: auto; color: #A9BCAF; flex-shrink: 0; }
.drawer-logout { display: flex; align-items: center; justify-content: center; gap: 8px; margin: 8px 16px 20px; padding: 13px; border-radius: 14px; border: 1.5px solid #F6D9D9; background: none; color: var(--red); font-size: 14px; font-weight: 700; cursor: pointer; transition: background .2s ease; }
.drawer-logout:hover { background: #FDF1F1; }
.drawer-logout svg { width: 16px; height: 16px; }
.drawer-close:hover svg { transform: rotate(90deg); }
.drawer-close:active svg { transform: rotate(90deg) scale(.8); }

/* Splash / Login */
.splash-screen { min-height: 100vh; display: grid; place-content: center; justify-items: center; background: var(--grad-hero); color: #F7FDF9; }
.splash-mark { font-size: 50px; font-weight: 600; letter-spacing: -.015em; display: flex; align-items: baseline; gap: 1px; text-shadow: 0 6px 28px rgba(0,0,0,.35); animation: mgFade .8s ease both; }
.splash-mark .mark-money { color: #FFFFFF; }
.splash-mark .mark-go, .login-mark .mark-go {
  font-weight: 600; text-shadow: none;
  background: linear-gradient(110deg, #A7F3D0 0%, #34D399 30%, #EAFFF5 50%, #34D399 70%, #A7F3D0 100%);
  background-size: 200% 100%; -webkit-background-clip: text; background-clip: text; color: transparent;
  animation: markShine 2.8s linear infinite;
}
.splash-mark-rule { width: 44px; height: 2px; border-radius: 2px; background: linear-gradient(90deg, transparent, #6EE7B7, transparent); margin: 12px auto 0; opacity: .9; }
.splash-tag { margin: 10px 0 0; color: #9EE0C2; font-size: 12.5px; font-weight: 600; letter-spacing: .16em; text-transform: uppercase; text-align: center; animation: mgFade .8s ease .25s both; }
@keyframes mgFade { from { opacity: 0; transform: translateY(14px); } }
.login-screen { min-height: 100vh; display: flex; flex-direction: column; }
.login-art { background: var(--grad-hero); color: #F7FDF9; padding: 64px 28px 46px; }
.login-mark { font-size: 36px; font-weight: 600; letter-spacing: -.015em; display: flex; align-items: baseline; gap: 1px; text-shadow: 0 4px 20px rgba(0,0,0,.3); }
.login-mark .mark-money { color: #FFFFFF; }
.login-tag { margin: 8px 0 0; color: #9EE0C2; font-size: 13.5px; font-weight: 500; letter-spacing: .04em; }
.login-panel { flex: 1; background: var(--bg); margin-top: -18px; border-radius: 26px 26px 0 0; padding: 30px 24px 40px; max-width: 480px; width: 100%; margin-left: auto; margin-right: auto; box-shadow: 0 -14px 30px -22px rgba(7,32,23,.5); }
@media (min-width: 900px) {
  .login-screen { flex-direction: row; }
  .login-art { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 60px; }
  .login-panel { flex: 1; margin-top: 0; border-radius: 0; display: flex; flex-direction: column; justify-content: center; padding: 60px; max-width: none; box-shadow: none; }
}
.login-h { font-size: 29px; font-weight: 600; margin: 0 0 8px; }
.phone-row { display: flex; gap: 10px; }
.cc { display: grid; place-items: center; padding: 0 14px; border: 1.5px solid var(--line); border-radius: 14px; background: var(--card); font-weight: 700; color: var(--ink-soft); }
.phone-row .input { flex: 1; min-width: 0; letter-spacing: .04em; font-size: 16px; }
.otp-row { display: flex; gap: 9px; }
.otp-box { width: 100%; aspect-ratio: .84; text-align: center; border: 1.5px solid var(--line); border-radius: 14px; background: var(--card); font-family: "Clash Display", sans-serif; font-size: 21px; font-weight: 600; outline: none; transition: border-color .2s ease, box-shadow .2s ease; }
.otp-box:focus { border-color: var(--brand); box-shadow: 0 0 0 4px rgba(16,185,129,.15); }
.error-text { color: var(--red); font-size: 13px; margin: 10px 0 0; }
.back-link { display: inline-flex; align-items: center; gap: 6px; margin-bottom: 18px; background: none; border: 0; padding: 0; font-size: 13.5px; font-weight: 600; color: var(--ink-soft); cursor: pointer; }
.back-link svg { width: 15px; height: 15px; }
.resend-link { display: block; margin: 16px auto 0; background: none; border: 0; font-size: 13.5px; font-weight: 700; color: var(--brand-deep); cursor: pointer; }
.resend-link:disabled { color: var(--ink-soft); font-weight: 500; cursor: default; }
.login-legal { color: var(--ink-soft); font-size: 12px; margin-top: 18px; }
.login-secure { display: flex; align-items: center; gap: 8px; margin-top: 34px; color: var(--ink-soft); font-size: 12.5px; }
.login-secure svg { width: 15px; height: 15px; color: var(--brand); flex-shrink: 0; }
.consent-row { display: flex; align-items: flex-start; gap: 10px; margin-top: 18px; }
.consent-row input[type="checkbox"] { width: 19px; height: 19px; margin-top: 1px; accent-color: var(--brand); cursor: pointer; flex-shrink: 0; }
.consent-row label { font-size: 12.5px; color: var(--ink-soft); line-height: 1.5; cursor: pointer; }
.legal-link { background: none; border: 0; padding: 0; font: inherit; color: var(--brand-deep); font-weight: 700; text-decoration: underline; cursor: pointer; }
.legal-sheet-layer { position: fixed; inset: 0; z-index: 70; display: none; align-items: flex-end; justify-content: center; }
.legal-sheet-layer.on { display: flex; }
.legal-sheet-backdrop { position: absolute; inset: 0; background: rgba(7,32,23,.5); }
.legal-sheet { position: relative; background: #FBFDFB; width: 100%; max-width: 480px; max-height: 80vh; overflow-y: auto; border-radius: 24px 24px 0 0; padding: 22px 20px 30px; }
@media (min-width: 900px) { .legal-sheet-layer { align-items: center; } .legal-sheet { border-radius: 20px; } }
.legal-sheet-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }

/* Trust line, offer cards */
.trust-line { display: flex; align-items: center; gap: 8px; margin: 4px 2px 24px; color: var(--ink-soft); font-size: 12.5px; font-weight: 500; }
.trust-line svg { width: 15px; height: 15px; color: var(--brand); flex-shrink: 0; }
.offer-grid { display: grid; gap: 12px; }
@media (min-width: 720px) { .offer-grid { grid-template-columns: 1fr 1fr; } }
.offer-card {
  --acc1: #059669; --acc2: #34D399;
  display: flex; align-items: center; gap: 16px; width: 100%; text-align: left; background: var(--card);
  border: 1px solid var(--line); border-radius: 18px; padding: 18px; cursor: pointer; font: inherit; color: inherit;
  box-shadow: var(--shadow-card);
  transition: border-color .2s ease, transform .2s ease, box-shadow .2s ease;
}
.offer-grid .offer-card:nth-child(4n+2) { --acc1: #0284C7; --acc2: #38BDF8; }
.offer-grid .offer-card:nth-child(4n+3) { --acc1: #F97316; --acc2: #FBBF24; }
.offer-grid .offer-card:nth-child(4n) { --acc1: #DB2777; --acc2: #F472B6; }
.offer-card:hover { border-color: var(--acc1); transform: translateY(-3px); box-shadow: 0 20px 40px -22px var(--acc1); }
.offer-card-icon { width: 50px; height: 50px; border-radius: 16px; flex-shrink: 0; background: linear-gradient(135deg, var(--acc1), var(--acc2)); color: #fff; display: grid; place-items: center; box-shadow: 0 10px 20px -10px var(--acc1), inset 0 1px 0 rgba(255,255,255,.3); }
.offer-card-icon svg { width: 24px; height: 24px; }
.offer-card-body { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.offer-card-title { font-size: 16px; font-weight: 700; }
.offer-card-blurb { display: block; font-size: 12.5px; color: var(--ink-soft); margin-top: 3px; }
.offer-card-meta { display: flex; gap: 12px; margin-top: 9px; font-size: 12px; }
.live-count { display: inline-flex; align-items: center; gap: 6px; color: var(--acc1); font-weight: 700; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulseDot 1.8s ease infinite; }
.top-reward { color: var(--green); font-weight: 800; flex-shrink: 0; white-space: nowrap; font-size: 12px; }
.offer-card-arrow { color: #A9BCAF; transition: color .2s ease, transform .2s ease; flex-shrink: 0; }
.offer-card-arrow svg { width: 18px; height: 18px; }
.offer-card:hover .offer-card-arrow { color: var(--acc1); transform: translateX(3px); }

/* Category listing */
.seg { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; background: var(--panel); border-radius: 14px; padding: 4px; }
.seg-btn { border: 0; background: none; border-radius: 11px; padding: 11px 0; font: inherit; font-size: 13.5px; font-weight: 700; color: var(--ink-soft); cursor: pointer; transition: background .2s ease, color .2s ease, box-shadow .2s ease; }
.seg-btn.on { background: var(--card); color: var(--brand-deep); box-shadow: 0 6px 16px -8px rgba(16,58,42,.35); }
.status-chip { font-size: 11px; font-weight: 700; padding: 6px 11px; border-radius: 999px; background: var(--panel); color: var(--ink-soft); flex-shrink: 0; }
.status-chip.inProgress { background: #FEEEDD; color: #C2570B; }
.status-chip.completed { background: #E2F8EE; color: var(--brand-deep); }
.status-chip.expired { background: #FDE8E8; color: var(--red); }

/* Offer detail */
.offer-hero { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
.offer-hero-icon { background: linear-gradient(135deg, #059669, #34D399); box-shadow: 0 10px 20px -10px #059669, inset 0 1px 0 rgba(255,255,255,.3); }
.offer-logo-img { width: 100%; height: 100%; object-fit: cover; border-radius: 16px; }
.offer-gallery { display: flex; gap: 10px; overflow-x: auto; margin: 0 -20px 16px; padding: 0 20px; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
.offer-gallery::-webkit-scrollbar { display: none; }
.offer-gallery-card { flex: 0 0 auto; width: 150px; aspect-ratio: 9 / 19; border-radius: 22px; overflow: hidden; position: relative; scroll-snap-align: start; background: var(--grad-hero); color: #F7FDF9; display: flex; flex-direction: column; justify-content: flex-end; padding: 16px; box-shadow: var(--shadow-card); }
.offer-gallery-card img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
.offer-gallery-card span { position: relative; z-index: 1; font-size: 13px; font-weight: 700; line-height: 1.35; }
.offer-stats-bar { display: flex; align-items: center; gap: 10px; background: none; padding: 2px 2px; margin-bottom: 18px; font-size: 12.5px; font-weight: 600; color: var(--ink-soft); flex-wrap: wrap; }
.offer-stats-bar .sep { color: #C4D4C8; }
.offer-stats-bar .stars { color: #F59E0B; letter-spacing: 1px; }

<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, createContext, useContext } = React;
const { createPortal } = ReactDOM;

/* ====================== Supabase connection ====================== */
const SUPABASE_URL = "https://qduunthrfkigwzjdcqru.supabase.co";
const SUPABASE_KEY = "sb_publishable_iYdWE9UrB7n6U3zqq4scEg_SFStnS2m";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Turns a raw Supabase offers row into the shape the UI components expect.
function mapOfferRow(row) {
  return {
    id: row.id,
    name: row.name,
    blurb: (row.description || "").slice(0, 70),
    rewardLabel: "Earn up to \u20B9" + row.reward,
    trackingLink: row.tracking_link || "",
    description: row.description || "",
    steps: (row.steps || "").split("\n").map(s => s.trim()).filter(Boolean),
    hint: row.hint || "",
    disclaimer: row.disclaimer || "",
    tiers: (row.tiers || []).map(t => ({ label: t.label, reward: Number(t.reward) || 0 })),
    logoUrl: row.logo_url || "",
    screenshots: row.screenshots || [],
  };
}

// Fetched once on app start and grouped by category. Components read this the
// same way they always did (OFFERS[categoryId], findOffer(...)) — only the
// source of the data changed, from a hardcoded object to a live DB fetch.
async function loadOffersFromSupabase() {
  try {
    const { data, error } = await sb.from("offers").select("*").eq("status", "live");
    if (error) throw error;
    const grouped = { invest: [], kyc: [], play: [] };
    for (const row of (data || [])) {
      if (grouped[row.category]) grouped[row.category].push(mapOfferRow(row));
    }
    Object.assign(OFFERS, grouped);
  } catch (e) {
    console.error("Failed to load offers from Supabase:", e);
  }
}

/* ====================== Supabase-backed user & wallet ======================
   Real OTP verification isn't wired yet (Step D — needs an SMS provider), so
   login still just takes a phone number. But the "user" behind that number is
   now a real row in the users table, and wallet balance/transactions are real
   too — only the phone verification step is still a placeholder. */
async function getOrCreateUser(phone) {
  const { data: existing, error: findErr } = await sb.from("users").select("*").eq("phone", phone).maybeSingle();
  if (findErr) throw findErr;
  if (existing) return existing;
  const { data: created, error: createErr } = await sb.from("users").insert({ phone }).select().single();
  if (createErr) throw createErr;
  return created;
}

/* ====================== Tiny hash router (no external lib) ====================== */
function parseHash() {
  let h = window.location.hash.slice(1);
  if (!h) h = "/";
  if (!h.startsWith("/")) h = "/" + h;
  return h;
}
function navigate(to, opts) {
  const newHash = "#" + to;
  if (opts && opts.replace) {
    // history.replaceState never reloads the document (location.replace does,
    // which 404s on hosts that don't serve the reconstructed URL).
    try { window.history.replaceState(null, "", newHash); }
    catch (err) { window.location.hash = to; return; }
    window.dispatchEvent(new Event("hashchange"));
  } else if (window.location.hash === newHash) {
    window.dispatchEvent(new Event("hashchange"));
  } else {
    window.location.hash = to;
  }
}
function getSplashShown() { try { return sessionStorage.getItem("earnora_splash_shown"); } catch (e) { return "1"; } }
function setSplashShown() { try { sessionStorage.setItem("earnora_splash_shown", "1"); } catch (e) {} }
function goBack() { window.history.back(); }
function useRoute() {
  const [path, setPath] = useState(parseHash());
  useEffect(() => {
    const onHash = () => setPath(parseHash());
    window.addEventListener("hashchange", onHash);
    return () => window.removeEventListener("hashchange", onHash);
  }, []);
  return path;
}
function matchPath(pattern, path) {
  const pp = pattern.split("/").filter(Boolean);
  const sp = path.split("/").filter(Boolean);
  if (pp.length !== sp.length) return null;
  const params = {};
  for (let i = 0; i < pp.length; i++) {
    if (pp[i].startsWith(":")) params[pp[i].slice(1)] = decodeURIComponent(sp[i]);
    else if (pp[i] !== sp[i]) return null;
  }
  return params;
}

function useCountUp(target, duration) {
  duration = duration || 900;
  const [value, setValue] = useState(0);
  const raf = useRef(null);
  useEffect(() => {
    const start = performance.now();
    const tick = (now) => {
      const t = Math.min((now - start) / duration, 1);
      setValue(target * (1 - Math.pow(1 - t, 3)));
      if (t < 1) raf.current = requestAnimationFrame(tick);
    };
    raf.current = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf.current);
  }, [target, duration]);
  return value;
}

  { id: "t1", type: "credit", label: "Groww — First deposit", date: "2 Jul, 6:41 PM", amount: 350 },
  { id: "t2", type: "credit", label: "Referral commission — Angel One", date: "1 Jul, 11:02 AM", amount: 120 },

const SESSION_KEY = "earnora_session_v1";
function loadSession() {
  try { const raw = localStorage.getItem(SESSION_KEY); if (raw) return JSON.parse(raw); } catch (e) {}
  return null;
}
function AppStateProvider({ children }) {
  const savedSession = loadSession();
  const [phone, setPhone] = useState(savedSession?.phone || "");
  const [userId, setUserId] = useState(savedSession?.userId || null);
  const [isAuthenticated, setIsAuthenticated] = useState(!!(savedSession && savedSession.isAuthenticated));
  const [name, setName] = useState("Suraj Tiwari");
  const [photo, setPhoto] = useState(null);
  const [email, setEmail] = useState("");
  const [emailStatus, setEmailStatus] = useState("unset");
  const [emailResendIn, setEmailResendIn] = useState(0);
  const [dob, setDob] = useState("");
  const [dobLocked, setDobLocked] = useState(false);
  const [gender, setGender] = useState("");
  const [balance, setBalance] = useState(0);
  const [transactions, setTransactions] = useState([]);
  const [offerStatus, setOfferStatus] = useState({});
  const [tierProgress, setTierProgress] = useState({});
  const [pendingTiers, setPendingTiers] = useState({});
  const [playSeconds, setPlaySeconds] = useState({});
  const [savedUpis, setSavedUpis] = useState([]);
  const [savedBanks, setSavedBanks] = useState([]);

  // On refresh, if a session already exists, re-hydrate real balance,
  // transactions, and offer progress from Supabase instead of starting from zero.
  useEffect(() => {
    if (!userId) return;
    (async () => {
      try {
        const { data: user } = await sb.from("users").select("wallet_balance, saved_upis, saved_banks").eq("id", userId).maybeSingle();
        if (user) {
          setBalance(Number(user.wallet_balance) || 0);
          setSavedUpis(user.saved_upis || []);
          setSavedBanks(user.saved_banks || []);
        }
        setTransactions(await fetchWalletTransactions(userId));
        const rows = await fetchUserOffers(userId);
        const statusMap = {}, progressMap = {}, secondsMap = {}, pendingMap = {};
        rows.forEach(r => {
          const key = r.category_id + ":" + r.offer_id;
          statusMap[key] = r.status;
          progressMap[key] = r.tier_progress || 0;
          secondsMap[key] = r.play_seconds || 0;
          if (r.pending_tier !== null && r.pending_tier !== undefined) pendingMap[key] = r.pending_tier;
        });
        setOfferStatus(prev => Object.assign({}, prev, statusMap));
        setTierProgress(prev => Object.assign({}, prev, progressMap));
        setPlaySeconds(prev => Object.assign({}, prev, secondsMap));
        setPendingTiers(pendingMap);
      } catch (e) { console.error("Failed to load wallet/offer state:", e); }
    })();
  }, [userId]);

  // Live session watch: polls every 15s (and whenever the tab becomes visible again) so that
  // (a) an admin's wallet adjustment shows up without the user having to log out/in, and
  // (b) a ban applied mid-session logs the user out immediately instead of on next refresh.
  useEffect(() => {
    if (!isAuthenticated || !userId) return;
    let cancelled = false;
    const poll = async () => {
      const data = await checkUserLiveStatus(userId);
      if (cancelled || !data) return;
      if (data.banned) {
        try { sessionStorage.setItem("earnora_ban_notice", data.ban_reason || ""); } catch (e) {}
        logout();
        return;
      }
      setBalance(Number(data.wallet_balance) || 0);
      setTransactions(await fetchWalletTransactions(userId));
    };
    const id = setInterval(poll, 15000);
    const onVisible = () => { if (document.visibilityState === "visible") poll(); };
    document.addEventListener("visibilitychange", onVisible);
    return () => { cancelled = true; clearInterval(id); document.removeEventListener("visibilitychange", onVisible); };
  }, [isAuthenticated, userId]);

  // Phone number becomes a real row in the "users" table. Real OTP
  // verification (Step D) will slot in before this call once an SMS
  // provider is connected — the user/wallet plumbing won't need to change.
  const login = async (p) => {
    try {
      const user = await getOrCreateUser(p);
      if (user.banned) return { ok: false, banned: true, reason: user.ban_reason || "" };
      setPhone(p);
      setUserId(user.id);
      setBalance(Number(user.wallet_balance) || 0);
      setSavedUpis(user.saved_upis || []);
      setSavedBanks(user.saved_banks || []);
      setTransactions(await fetchWalletTransactions(user.id));
      setIsAuthenticated(true);
      localStorage.setItem(SESSION_KEY, JSON.stringify({ phone: p, userId: user.id, isAuthenticated: true }));
      return { ok: true };
    } catch (e) {
      console.error("Login failed:", e);
      return { ok: false, error: true };
    }
  };
  const logout = () => { setIsAuthenticated(false); setPhone(""); setUserId(null); try { localStorage.removeItem(SESSION_KEY); } catch (e) {} };
  const statusKey = (c, o) => c + ":" + o;
  const getOfferStatus = (c, o) => offerStatus[statusKey(c, o)] || "live";
  const markInProgress = (c, o) => {
    const k = statusKey(c, o);
    setOfferStatus(prev => prev[k] ? prev : Object.assign({}, prev, { [k]: "in_progress" }));
    if (userId && !offerStatus[k]) upsertUserOffer(userId, c, o, { status: "in_progress", tier_progress: 0 });
  };

  // Dev-only "simulate completed" shortcut (see the preview button on the offer page) —
  // real completion for tiered offers now happens only via requestTierVerification below.
  const completeOffer = (categoryId, offer) => {
    const key = statusKey(categoryId, offer.id);
    const rewardTotal = offer.tiers.reduce((s, t) => s + t.reward, 0);
    const label = offer.name + " — offer completed";
    const newBalance = Math.round((balance + rewardTotal) * 100) / 100;
    setOfferStatus(prev => Object.assign({}, prev, { [key]: "completed" }));
    setBalance(newBalance);
    setTransactions(prev => [{ id: "txn-" + Date.now(), type: "credit", label, date: "Just now", amount: rewardTotal }].concat(prev));
    if (userId) {
      insertWalletTransaction(userId, rewardTotal, "credit", label);
      updateUserBalance(userId, newBalance);
      upsertUserOffer(userId, categoryId, offer.id, { status: "completed", tier_progress: offer.tiers.length, pending_tier: null });
    }
  };
  const expireOffer = (categoryId, offerId) => {
    const key = statusKey(categoryId, offerId);
    setOfferStatus(prev => Object.assign({}, prev, { [key]: "expired" }));
    if (userId) upsertUserOffer(userId, categoryId, offerId, { status: "expired" });
  };
  const getTierProgress = (c, o) => tierProgress[statusKey(c, o)] || 0;
  const getPendingTier = (c, o) => { const v = pendingTiers[statusKey(c, o)]; return v === undefined ? null : v; };
  const getPlaySeconds = (c, o) => playSeconds[statusKey(c, o)] || 0;
  const addPlaySeconds = (c, o, secs) => {
    const key = statusKey(c, o);
    const newSecs = (playSeconds[key] || 0) + secs;
    setPlaySeconds(prev => Object.assign({}, prev, { [key]: newSecs }));
    if (userId) upsertUserOffer(userId, c, o, { play_seconds: newSecs });
  };
  // FIX: tapping "Verify" no longer auto-credits the reward itself. It only submits the
  // milestone for confirmation and shows "Pending" — real crediting happens once the partner
  // postback pipeline (Step F) confirms it. This closes the "anyone can tap Verify and get
  // free money" bug.
  const requestTierVerification = (categoryId, offerId, tierIndex) => {
    const key = statusKey(categoryId, offerId);
    setPendingTiers(prev => Object.assign({}, prev, { [key]: tierIndex }));
    if (userId) upsertUserOffer(userId, categoryId, offerId, { status: "in_progress", pending_tier: tierIndex });
  };

  // FIX: manual refresh for the wallet balance card — lets a user pull the latest
  // balance/history on demand instead of waiting for the 15s background poll or a full page reload.
  const [walletRefreshing, setWalletRefreshing] = useState(false);
  const refreshWallet = async () => {
    if (!userId || walletRefreshing) return;
    setWalletRefreshing(true);
    try {
      const data = await checkUserLiveStatus(userId);
      if (data) setBalance(Number(data.wallet_balance) || 0);
      setTransactions(await fetchWalletTransactions(userId));
    } finally {
      setWalletRefreshing(false);
    }
  };

  // FIX (diagnostic): the withdrawal insert used to fire-and-forget with only a
  // console.error on failure, so if it silently failed (bad column, RLS block, etc.)
  // the user's wallet still showed "Pending" locally but admin never saw the request,
  // with no way to tell why. This surfaces the real Supabase error on screen.
  const [withdrawalSyncError, setWithdrawalSyncError] = useState(null);

  const requestWithdrawal = ({ amount, method, upiId, accountNumber, ifsc }) => {
    if (!amount || amount < MIN_WITHDRAWAL || amount > balance) return { ok: false };
    const label = method === "upi" ? "Withdrawal to UPI · " + upiId : "Withdrawal to bank · " + accountNumber.slice(-4).padStart(accountNumber.length, "•");
    const newBalance = Math.round((balance - amount) * 100) / 100;
    const entry = { id: "wd-" + Date.now(), type: "debit", label, date: "Just now", amount, status: "Pending", method, upiId, accountNumber, ifsc };
    setBalance(newBalance);
    setTransactions(prev => [entry].concat(prev));
    setWithdrawalSyncError(null);
    if (userId) {
      insertWalletTransaction(userId, amount, "debit", label);
      updateUserBalance(userId, newBalance);
      insertWithdrawalRequest(userId, { amount, method, upiId, accountNumber, ifsc }).then(res => {
        if (!res.ok) setWithdrawalSyncError(res.error);
      });
    }
    return { ok: true, entry };
  };

  const addUpi = (upiId) => {
    const clean = upiId.trim();
    if (!UPI_REGEX.test(clean)) return { ok: false, error: "Enter a valid UPI ID." };
    if (savedUpis.includes(clean)) return { ok: false, error: "This UPI ID is already saved." };
    if (savedUpis.length >= UPI_LIMIT) return { ok: false, error: "You can save up to " + UPI_LIMIT + " UPI IDs only." };
    const next = savedUpis.concat(clean);
    setSavedUpis(next);
    if (userId) updateSavedUpisInSupabase(userId, next);
    return { ok: true };
  };
  const removeUpi = (upiId) => {
    const next = savedUpis.filter(u => u !== upiId);
    setSavedUpis(next);
    if (userId) updateSavedUpisInSupabase(userId, next);
  };

  const addBank = ({ accountNumber, ifsc }) => {
    const acc = accountNumber.trim(), ifs = ifsc.trim().toUpperCase();
    if (acc.length < 6) return { ok: false, error: "Enter a valid account number." };
    if (!IFSC_REGEX.test(ifs)) return { ok: false, error: "Enter a valid IFSC code." };
    if (savedBanks.some(b => b.accountNumber === acc)) return { ok: false, error: "This bank account is already saved." };
    if (savedBanks.length >= BANK_LIMIT) return { ok: false, error: "You can save up to " + BANK_LIMIT + " bank accounts only." };
    const next = savedBanks.concat({ id: "bank-" + Date.now(), accountNumber: acc, ifsc: ifs });
    setSavedBanks(next);
    if (userId) updateSavedBanksInSupabase(userId, next);
    return { ok: true };
  };
  const removeBank = (id) => {
    const next = savedBanks.filter(b => b.id !== id);
    setSavedBanks(next);
    if (userId) updateSavedBanksInSupabase(userId, next);
  };

  const offersByStatusForCategory = (categoryId) => {
    const all = OFFERS[categoryId] || [];
    const live = [], inProgress = [], completed = [], expired = [];
    for (const offer of all) {
      const s = getOfferStatus(categoryId, offer.id);
      if (s === "completed") completed.push(offer);
      else if (s === "expired") expired.push(offer);
      else if (s === "in_progress") inProgress.push(offer);
      else live.push(offer);
    }
    return { live, inProgress, completed, expired };
  };

  const value = { phone, isAuthenticated, login, logout, name, setName, photo, setPhoto, email, setEmail,
    emailStatus, setEmailStatus, emailResendIn, setEmailResendIn, dob, setDob, dobLocked, setDobLocked,
    gender, setGender, balance, transactions, getOfferStatus, markInProgress, completeOffer, expireOffer, offersByStatusForCategory, requestWithdrawal,
    refreshWallet, walletRefreshing, withdrawalSyncError,
    getTierProgress, requestTierVerification, getPendingTier, getPlaySeconds, addPlaySeconds,
    savedUpis, addUpi, removeUpi, savedBanks, addBank, removeBank };

  return <AppStateContext.Provider value={value}>{children}</AppStateContext.Provider>;
}
function useAppState() { return useContext(AppStateContext); }

function Login() {
  const { login } = useAppState();
  const [step, setStep] = useState("phone");
  const [phone, setPhone] = useState("");
  const [otp, setOtp] = useState(["", "", "", "", "", ""]);
  const [error, setError] = useState("");
  const [resendIn, setResendIn] = useState(0);
  const [agreed, setAgreed] = useState(false);
  const [legalView, setLegalView] = useState(null); // null | "terms" | "privacy"
  const otpRefs = useRef([]);

  useEffect(() => {
    if (resendIn <= 0) return;
    const id = setTimeout(() => setResendIn(s => s - 1), 1000);
    return () => clearTimeout(id);
  }, [resendIn]);

  // If the live-session poll just force-logged this person out for being banned, show why.
  useEffect(() => {
    try {
      const note = sessionStorage.getItem("earnora_ban_notice");
      if (note !== null) {
        setError(note ? `Your account has been suspended. Reason: ${note}` : "Your account has been suspended. Please contact support.");
        sessionStorage.removeItem("earnora_ban_notice");
      }
    } catch (e) {}
  }, []);

  const submittedRef = useRef(false);
  useEffect(() => {
    if (step !== "otp") { submittedRef.current = false; return; }
    const code = otp.join("");
    if (code.length === 6 && !otp.includes("") && !submittedRef.current) {
      submittedRef.current = true;
      verify(code);
    }
  }, [otp, step]);

  const [checkingBan, setCheckingBan] = useState(false);
  const banErrorText = (reason) => reason ? `Your account has been suspended. Reason: ${reason}` : "Your account has been suspended. Please contact support.";
  // FIX: ban is now checked the moment the number is entered — before OTP is even sent —
  // so a banned user sees the reason right away instead of getting into the app.
  const requestOtp = async () => {
    if (!agreed) { setError("Please agree to the Terms & Conditions and Privacy Policy to continue."); return; }
    if (!/^[6-9]\d{9}$/.test(phone)) { setError("Enter a valid 10-digit mobile number."); return; }
    setError("");
    setCheckingBan(true);
    const rec = await checkBanByPhone(phone);
    setCheckingBan(false);
    if (rec && rec.banned) { setError(banErrorText(rec.ban_reason)); return; }
    // TODO: POST /auth/otp/request { phone } — server also runs VPN/device checks here.
    setStep("otp"); setResendIn(60);
    setTimeout(() => { if (otpRefs.current[0]) otpRefs.current[0].focus(); }, 50);
  };
  const setDigit = (i, v) => {
    if (!/^\d?$/.test(v)) return;
    const next = otp.slice(); next[i] = v; setOtp(next);
    if (v && i < 5 && otpRefs.current[i + 1]) otpRefs.current[i + 1].focus();
  };
  const onOtpKey = (i, e) => { if (e.key === "Backspace" && !otp[i] && i > 0 && otpRefs.current[i - 1]) otpRefs.current[i - 1].focus(); };
  const verify = async (codeOverride) => {
    const code = codeOverride || otp.join("");
    if (code.length !== 6) { setError("Enter the 6-digit code."); return; }
    setError("");
    // TODO: POST /auth/otp/verify { phone, code } → session token.
    const res = await login(phone);
    if (!res.ok) {
      setStep("phone");
      setOtp(["", "", "", "", "", ""]);
      setError(res.banned ? banErrorText(res.reason) : "Something went wrong. Please try again.");
      return;
    }
    navigate("/", { replace: true });
  };

  return (
    <div className="login-screen">
      <div className="login-art">
        <div className="serif login-mark"><span className="mark-money">Earn</span><span className="mark-go">ora</span></div>
        <p className="login-tag">Trusted. Tracked. Rewarded.</p>
      </div>
      <div className="login-panel">
        {step === "phone" ? (
          <React.Fragment>
            <h1 className="serif login-h">Sign in</h1>
            <p className="sub">One account per mobile number. We verify with an OTP — no passwords.</p>
            <label className="field-label" htmlFor="phone">Mobile number</label>
            <div className="phone-row">
              <span className="cc">+91</span>
              <input id="phone" className="input" type="tel" inputMode="numeric" maxLength={10} placeholder="10-digit number"
                value={phone} onChange={e => setPhone(e.target.value.replace(/\D/g, ""))} onKeyDown={e => { if (e.key === "Enter") requestOtp(); }} />
            </div>
            {error && <p className="error-text" role="alert">{error}</p>}
            <div className="consent-row">
              <input type="checkbox" id="agree" checked={agreed} onChange={e => setAgreed(e.target.checked)} />
              <label htmlFor="agree">
                I agree to the <button type="button" className="legal-link" onClick={() => setLegalView("terms")}>Terms &amp; Conditions</button> and <button type="button" className="legal-link" onClick={() => setLegalView("privacy")}>Privacy Policy</button>.
              </label>
            </div>
            <button className="btn block" style={{ marginTop: 14 }} onClick={requestOtp} disabled={!agreed || checkingBan}>{checkingBan ? "Please wait…" : <React.Fragment>Send OTP <Icon.Arrow /></React.Fragment>}</button>
          </React.Fragment>
        ) : (
          <React.Fragment>
            <button className="back-link" onClick={() => { setStep("phone"); setOtp(["","","","","",""]); setError(""); }}><Icon.Back /> Change number</button>
            <h1 className="serif login-h">Verify OTP</h1>
            <p className="sub">Code sent to <span className="mono">+91 {phone}</span></p>
            <div className="otp-row">
              {otp.map((d, i) => (
                <input key={i} ref={el => { otpRefs.current[i] = el; }} className="otp-box" type="tel" inputMode="numeric" maxLength={1}
                  value={d} aria-label={"Digit " + (i + 1)} onChange={e => setDigit(i, e.target.value)} onKeyDown={e => onOtpKey(i, e)} />
              ))}
            </div>
            {error && <p className="error-text" role="alert">{error}</p>}
            <button className="btn block" style={{ marginTop: 20 }} onClick={verify}>Verify and continue <Icon.Arrow /></button>
            <button className="resend-link" disabled={resendIn > 0} onClick={() => setResendIn(60)}>
              {resendIn > 0 ? "Resend code in " + resendIn + "s" : "Resend code"}
            </button>
          </React.Fragment>
        )}
        <div className="login-secure"><Icon.Shield /> Sessions on VPN or proxy connections cannot sign in.</div>
      </div>
      <div className={"legal-sheet-layer" + (legalView ? " on" : "")}>
        <div className="legal-sheet-backdrop" onClick={() => setLegalView(null)}></div>
        <div className="legal-sheet">
          <div className="legal-sheet-head">
            <h2 className="serif" style={{ fontSize: 19, margin: 0 }}>{legalView === "terms" ? "Terms & conditions" : "Privacy policy"}</h2>
            <button className="icon-btn" onClick={() => setLegalView(null)}><Icon.Close /></button>
          </div>
          <p className="sub" style={{ margin: 0 }}>
            {legalView === "terms"
              ? "This section will hold the live terms & conditions text, managed from the admin panel's content editor so it can change without a new release."
              : "This section will hold the live privacy policy text, managed from the admin panel's content editor so it can change without a new release."}
          </p>
          <button className="btn block" style={{ marginTop: 20 }} onClick={() => setLegalView(null)}>Close</button>
        </div>
      </div>
    </div>
  );
}

function CategoryListing({ params }) {
  const categoryId = params.categoryId;
  const { offersByStatusForCategory } = useAppState();
  const [view, setView] = useState("live");
  const [triedTab, setTriedTab] = useState("inProgress");
  const meta = CATEGORY_META[categoryId];
  if (!meta) return <div className="page"><PageHeader title="Not found" backTo="/" /><p className="sub">This category doesn't exist.</p></div>;
  const groups = offersByStatusForCategory(categoryId);
  const triedList = { inProgress: groups.inProgress, completed: groups.completed, expired: groups.expired }[triedTab];
  const TRIED_TABS = [{ id: "inProgress", label: "In progress" }, { id: "completed", label: "Completed" }, { id: "expired", label: "Expired" }];

  return (
    <div className="page fade-up">
      <PageHeader title={meta.title} backTo="/" />
      <p className="sub" style={{ marginTop: -8 }}>{meta.blurb}</p>
      <div className="seg">
        <button className={"seg-btn" + (view === "live" ? " on" : "")} onClick={() => setView("live")}>Live offers</button>
        <button className={"seg-btn" + (view === "tried" ? " on" : "")} onClick={() => setView("tried")}>Tried offers</button>
      </div>
      {view === "live" ? (
        <div className="offer-grid" style={{ marginTop: 16 }}>
          {groups.live.length === 0 && <p className="sub">No live offers left here — check Tried offers, or come back soon.</p>}
          {groups.live.map(offer => <OfferRow key={offer.id} offer={offer} onClick={() => navigate("/offers/" + categoryId + "/" + offer.id)} />)}
        </div>
      ) : (
        <React.Fragment>
          <div className="chip-row" style={{ marginTop: 16 }}>
            {TRIED_TABS.map(t => <button key={t.id} className={"chip" + (triedTab === t.id ? " on" : "")} onClick={() => setTriedTab(t.id)}>{t.label}</button>)}
          </div>
          <div className="offer-grid" style={{ marginTop: 14 }}>
            {triedList.length === 0 && <p className="sub">Nothing here yet.</p>}
            {triedList.map(offer => (
              <OfferRow key={offer.id} offer={offer} onClick={() => navigate("/offers/" + categoryId + "/" + offer.id)}
                trailing={<span className={"status-chip " + triedTab}>{triedTab === "inProgress" ? "In progress" : triedTab === "completed" ? "Completed" : "Expired"}</span>} />
            ))}
          </div>
        </React.Fragment>
      )}
    </div>
  );
}
